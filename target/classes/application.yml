server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

spring:
  application:
    name: SaaS Faturação AGT

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/saas_faturacao}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASS:postgres123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: SaasFaturacaoPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
      FAIL_ON_EMPTY_BEANS: false
    deserialization:
      FAIL_ON_UNKNOWN_PROPERTIES: false
    time-zone: Africa/Luanda

  cache:
    type: simple

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

# ── JWT ──────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:3f4a2b1c9d8e7f6a5b4c3d2e1f0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d4e3f2}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}      # 7 dias
    refresh-expiration-ms: ${JWT_REFRESH_MS:2592000000} # 30 dias

  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:4200,http://localhost:3000}

  reports:
    output-dir: ${REPORTS_DIR:./reports}
    logo-path: ${LOGO_PATH:classpath:static/logo.png}

  agt:
    api-url: ${AGT_API_URL:https://api.agt.ao}
    api-key: ${AGT_API_KEY:}
    sandbox: ${AGT_SANDBOX:true}

# ── SpringDoc / Swagger ──────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    persist-authorization: true

# ── Actuator ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ──────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    ao.saas.faturacao: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
