version: "3.9"

services:

  # ── PostgreSQL 15 ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: faturacao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       saas_faturacao
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (opcional) ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: faturacao_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@faturacao.ao
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev

  # ── API Java / Spring Boot ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faturacao_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:  jdbc:postgresql://postgres:5432/saas_faturacao
      DATABASE_USER: postgres
      DATABASE_PASS: postgres123
      JWT_SECRET:    ${JWT_SECRET:-mude-esta-chave-em-producao-minimo-32-chars}
      FRONTEND_URL:  ${FRONTEND_URL:-http://localhost:4200}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-default}
    ports:
      - "8080:8080"
    volumes:
      - reports_output:/app/reports
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  reports_output:
